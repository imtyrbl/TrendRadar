name: Sync ALL

on:
  schedule:
    # 每天凌晨4点自动同步一次
    - cron: "0 20 * * *"
  workflow_dispatch:  # 也支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream ${{ secrets.UPSTREAM_REPO_URL }}

      - name: Fetch upstream
        run: git fetch upstream

      - name: Backup workflows
        run: |
          mkdir -p /tmp/workflows_backup
          cp -r .github/workflows/* /tmp/workflows_backup/

      - name: Hard reset to upstream
        run: |
          git checkout master
          git reset --hard upstream/master

      - name: Restore workflows
        run: |
          mkdir -p .github/workflows
          cp -r /tmp/workflows_backup/* .github/workflows/

      - name: Commit and push
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git add .github/workflows
            git commit -m "Preserve local workflows during sync"
            git push origin master --force
          else
            git push origin master --force
          fi

      - name: Remove upstream remote
        if: always()
        run: git remote remove upstream || true

