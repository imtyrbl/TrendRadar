name: Force Sync

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_PAT: ${{ secrets.PAT }}
      GH_TOKEN: ${{ secrets.PAT }}
      REPO: imtyrbl/TrendRadar
      BRANCH: master
      UPSTREAM_REPO: sansan0/TrendRadar
    steps:
      - name: Download upstream zipball
        run: |
          echo "=== Downloading upstream zipball ==="
          curl -fsSL https://github.com/sansan0/TrendRadar/archive/refs/heads/master.tar.gz -o /tmp/upstream.tar.gz
          echo "Downloaded: $(du -sh /tmp/upstream.tar.gz)"

          mkdir -p /tmp/upstream_src
          tar -xzf /tmp/upstream.tar.gz -C /tmp/upstream_src
          UPSTREAM_DIR=$(find /tmp/upstream_src -maxdepth 1 -type d | tail -1)
          echo "UPSTREAM_DIR=$UPSTREAM_DIR" >> $GITHUB_ENV
          echo "Upstream contents:"
          ls "$UPSTREAM_DIR"

      - name: Clone fork and backup .github/
        run: |
          echo "=== Cloning fork ==="
          git clone https://x-access-token:$GH_PAT@github.com/$REPO.git /tmp/fork
          cd /tmp/fork
          git checkout $BRANCH

          echo ""
          echo "=== Saving entire .github/ from fork ==="
          mkdir -p /tmp/fork_github
          cp -r .github/* /tmp/fork_github/
          echo "Saved:"
          find /tmp/fork_github -type f | sed 's|/tmp/fork_github/||'

      - name: Build final content
        run: |
          echo "=== Building final repo ==="
          cd /tmp/fork

          echo "--- Delete all tracked files (keep .git) ---"
          git rm -rf . --ignore-unmatch

          echo "--- Copy all upstream content ---"
          cp -r "$UPSTREAM_DIR"/* .

          echo "--- Replace .github/ with fork's version ---"
          rm -rf .github
          cp -r /tmp/fork_github .github

          echo ""
          echo "--- Final .github/ contents ---"
          find .github -type f | sort

      - name: Commit and push
        run: |
          echo "=== Committing ==="
          cd /tmp/fork
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Force sync from upstream, preserve workflows" || echo "(nothing to commit)"
          git push --force origin $BRANCH
          echo "=== DONE ==="

      - name: Verify
        run: |
          echo "=== Verifying remote .github/ ==="
          gh api repos/$REPO/contents/.github \
            --jq '.[] | "\(.type)  \(.name)"'
