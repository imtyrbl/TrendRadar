name: Force Sync

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_PAT: ${{ secrets.PAT }}
      GH_TOKEN: ${{ secrets.PAT }}
      REPO: imtyrbl/TrendRadar
      BRANCH: master
      UPSTREAM_REPO: sansan0/TrendRadar
    steps:
      - name: Download upstream zipball
        run: |
          echo "=== Downloading upstream zipball ==="
          curl -fsSL https://github.com/sansan0/TrendRadar/archive/refs/heads/master.tar.gz -o /tmp/upstream.tar.gz
          echo "Downloaded: $(du -sh /tmp/upstream.tar.gz)"

          mkdir -p /tmp/upstream_src
          tar -xzf /tmp/upstream.tar.gz -C /tmp/upstream_src
          UPSTREAM_DIR=$(find /tmp/upstream_src -maxdepth 1 -type d | tail -1)
          echo "UPSTREAM_DIR=$UPSTREAM_DIR" >> $GITHUB_ENV

          echo "--- All files in upstream (including hidden) ---"
          ls -la "$UPSTREAM_DIR"

      - name: Clone fork and backup workflows
        run: |
          echo "=== Cloning fork ==="
          git clone https://x-access-token:$GH_PAT@github.com/$REPO.git /tmp/fork
          cd /tmp/fork
          git checkout $BRANCH

          echo ""
          echo "=== Saving fork workflows ==="
          mkdir -p /tmp/fork_workflows
          cp -r .github/workflows/* /tmp/fork_workflows/ 2>/dev/null || true
          echo "Saved: $(ls /tmp/fork_workflows/)"

      - name: Build final content
        run: |
          echo "=== Building final repo ==="
          cd /tmp/fork

          echo "--- Delete all tracked files (keep .git) ---"
          git rm -rf . --ignore-unmatch

          echo "--- Copy ALL upstream content (including hidden files) ---"
          # 用 .??* 匹配所有以 . 开头的文件和目录（非隐藏的 * 已覆盖）
          cp -r "$UPSTREAM_DIR"/* .
          cp -r "$UPSTREAM_DIR"/.??* .   # .dockerignore, .github 等隐藏文件/目录

          echo "--- Replace workflows with fork's version ---"
          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp -r /tmp/fork_workflows/* .github/workflows/

          echo ""
          echo "--- Verifying key files ---"
          ls -la .dockerignore .github/ 2>/dev/null || echo "(missing)"
          echo "--- Workflows ---"
          ls .github/workflows/

      - name: Commit and push
        run: |
          echo "=== Committing ==="
          cd /tmp/fork
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Force sync from upstream, preserve workflows" || echo "(nothing to commit)"
          git push --force origin $BRANCH
          echo "=== DONE ==="

      - name: Verify
        run: |
          echo "=== Verifying remote ---"
          gh api repos/$REPO/contents/.github \
            --jq '.[] | "\(.type)  \(.name)"'
          echo ""
          gh api repos/$REPO/contents/.dockerignore \
            --jq '.name' 2>/dev/null || echo ".dockerignore not found"
